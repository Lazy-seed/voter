
services:
  mongo:
    image: mongo:6
    container_name: live-polling-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - polling_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: live-polling-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/live-polling
      - PORT=8000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongo
    networks:
      - polling_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: live-polling-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - polling_network

networks:
  polling_network:
    driver: bridge

volumes:
  mongo_data:
